model_list:
- model_name: GLM-5.1-cursor
  protected: true
  model_params:
    api_type: openai
    model: glm-5.1
    api_base: https://api.z.ai/api/coding/paas/v4
    api_key: ${Z_AI_API_KEY}
    thinking:
      type: enabled
    request_timeout: 540
    parameters:
      temperature:
        default: 1.0
        allow_override: false
      top_p:
        default: 0.95
        allow_override: false
  modules:
    upstream:
      enabled: true
      response:
      - swap_reasoning_content
      swap_reasoning_content:
        mode: reasoning_to_content
        think_tag: think
        think_open:
          prefix: ''
          suffix: ''
        think_close:
