router_settings:
  num_retries: 1
proxy_settings:
  debug: false
  server:
    host: 0.0.0.0
    port: 7979
  enable_responses_endpoint: false
  enable_messages_endpoint: true
  logging:
    log_parsed_response: true
    log_parsed_stream: true
    log_to_disk: true
    full_request_storage:
      enabled: true
      path: logs/requests
      retention_hours: 48
      cleanup_on_startup: true
      cleanup_interval_hours: 24
  modules:
    upstream:
      enabled: false
      response:
      - parse_tags
      - swap_reasoning_content
      paths:
      - /chat/completions
      parse_tags:
        parse_thinking: true
        parse_tool_calls: true
        think_tag: think
        tool_arg_format: xml
        tool_tag: tool_call
      swap_reasoning_content:
        mode: reasoning_to_content
        think_tag: think
        think_open:
          prefix: ''
          suffix: ''
        think_close:
          prefix: ''
          suffix: ''
        include_newline: true
    downstream:
      enabled: false
      request: []
forwarder_settings:
  debug: false
  listen:
    host: 0.0.0.0
    port: 6969
  target:
    host: 127.0.0.1
    port: 7979
http_forwarder_settings:
  debug: false
  preserve_host: true
  listen:
    host: 0.0.0.0
    port: 6969
  target:
    scheme: http
    host: 0.0.0.0
    port: 7979
  ssl:
    enabled: false
    cert_file: certs/cert.pem
    key_file: certs/key.pem
    hosts:
    - localhost
    - 127.0.0.1
database:
  backend: sqlite
  connection:
    sqlite:
      path: logs/yaLLM.db
  pool_size: 5
  max_overflow: 10
